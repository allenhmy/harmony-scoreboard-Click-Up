<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmony Movers — Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Helvetica Neue',sans-serif;background:#fff;color:#1a1a1a;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:2rem 1.25rem}
.mono{font-family:'Space Mono',monospace}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.header-left{display:flex;align-items:center;gap:14px}
.logo{width:48px;height:48px;border-radius:50%;background:#c0392b;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,57,43,0.25)}
.logo svg{width:24px;height:24px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.header .date{font-size:13px;color:#888;text-transform:capitalize}
.btn{background:none;border:1.5px solid #e0e0e0;border-radius:8px;padding:6px 14px;font-size:12px;color:#666;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.btn:hover{border-color:#ccc;background:#fafafa}
.cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:2rem}
.card-red{background:linear-gradient(135deg,#c0392b,#a93226);border-radius:14px;padding:1.25rem;color:#fff;position:relative;overflow:hidden}
.card-red .circle{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.08)}
.card{background:#fafafa;border:1.5px solid #eee;border-radius:14px;padding:1.25rem}
.card-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.card-red .card-label{opacity:0.85}
.card .card-label{color:#888}
.card-number{font-size:36px;font-weight:700;line-height:1}
.card-sub{font-size:11px;margin-top:6px}
.card-red .card-sub{opacity:0.7}
.card .card-sub{color:#aaa}
.card .card-number{color:#1a1a1a}
.ring-card{display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap{position:relative;width:72px;height:72px}
.ring-text{position:absolute;top:0;left:0;width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#c0392b}
.section-title{font-size:15px;font-weight:700;letter-spacing:-0.01em;margin-bottom:14px}
.advisor-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;opacity:0;transform:translateX(-16px);animation:slideIn .4s ease-out forwards}
.advisor-rank{font-size:18px;font-weight:700;min-width:28px}
.advisor-rank.first{color:#c0392b}
.advisor-rank.other{color:#ccc}
.advisor-name{font-size:14px;font-weight:500;min-width:85px;color:#333}
.advisor-bar-bg{flex:1;height:28px;background:#f5f5f5;border-radius:6px;overflow:hidden}
.advisor-bar{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.advisor-bar span{font-size:12px;font-weight:700;color:rgba(255,255,255,0.9)}
.advisor-count{font-size:20px;font-weight:700;min-width:32px;text-align:right;color:#1a1a1a}
.unassigned{opacity:0.5}
.unassigned .advisor-name{color:#999;font-style:italic;font-size:13px}
.unassigned .advisor-count{color:#bbb;font-size:16px;font-weight:500}
.booking-row{display:flex;align-items:center;padding:8px 12px;border-radius:8px;opacity:0;animation:fadeIn .3s ease-out forwards}
.booking-row:nth-child(odd){background:#fafafa}
.booking-dot{width:6px;height:6px;border-radius:50%;background:#21ce78;margin-right:10px;flex-shrink:0}
.booking-name{font-size:13px;font-weight:500;color:#333;flex:1}
.booking-date{font-size:11px;color:#aaa;margin-right:10px}
.booking-badge{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px}
.more-text{font-size:12px;color:#bbb;text-align:center;margin-top:12px}
.footer{background:#fafafa;border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1.5rem}
.footer-dot{width:6px;height:6px;border-radius:50%;background:#21ce78}
.footer p{font-size:12px;color:#999}
.loading{text-align:center;padding:4rem 0}
.spinner{width:48px;height:48px;border:3px solid #f0f0f0;border-top-color:#c0392b;border-radius:50%;margin:0 auto 1.5rem;animation:spin .8s linear infinite}
.loading p{font-size:14px;color:#888}
.error{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:1.5rem;text-align:center}
.error p{font-size:14px;color:#991b1b;margin-bottom:12px}
.error button{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.setup{background:#f8f9fa;border:1.5px solid #e0e0e0;border-radius:14px;padding:2rem;text-align:center}
.setup h2{font-size:18px;margin-bottom:8px}
.setup p{font-size:13px;color:#888;margin-bottom:1.5rem}
.setup input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px}
.setup input:focus{outline:none;border-color:#c0392b}
.setup button{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<div class="wrap" id="app">
<div class="loading" id="loading" style="display:none">
<div class="spinner"></div>
<p id="loadMsg">Connexion à ClickUp...</p>
</div>
<div class="setup" id="setup">
<h2>Harmony Movers Scoreboard</h2>
<p>Entrez votre clé API ClickUp pour connecter le tableau de bord.<br>
<a href="https://app.clickup.com/settings/apps" target="_blank" style="color:#c0392b">Obtenir ma clé API →</a></p>
<input type="password" id="apiKeyInput" placeholder="pk_xxxxxxx_xxxxxxxxxxxxxxxxxxxxxx">
<div style="display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:12px">
<input type="number" id="goalInput" placeholder="Objectif mensuel" value="120" style="width:180px">
</div>
<button onclick="saveAndStart()">Connecter</button>
</div>
<div id="dashboard" style="display:none"></div>
</div>

<script>
const LIST_ID = "901702248706";
const ADVISOR_FIELD_ID = "8a4d9b59-7ae4-4121-bca8-68133c4cda83";
const ADVISORS = {0:"Elan",1:"Josée",2:"Peter",3:"Yasmine",4:"Lev",5:"Carole",6:"Théodore",7:"Léo"};
const COLORS = {Elan:"#c0392b",Josée:"#e91e8f",Peter:"#7c3aed",Yasmine:"#8b5cf6",Lev:"#0ea5e9",Carole:"#2563eb","Théodore":"#059669","Léo":"#6b7280"};
let API_KEY = "";
let GOAL = 120;

function saveAndStart() {
  API_KEY = document.getElementById("apiKeyInput").value.trim();
  GOAL = parseInt(document.getElementById("goalInput").value) || 120;
  if (!API_KEY) return alert("Clé API requise");
  localStorage.setItem("hm_api_key", API_KEY);
  localStorage.setItem("hm_goal", GOAL);
  document.getElementById("setup").style.display = "none";
  loadData();
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("hm_api_key");
  const savedGoal = localStorage.getItem("hm_goal");
  if (saved) {
    API_KEY = saved;
    GOAL = parseInt(savedGoal) || 120;
    document.getElementById("setup").style.display = "none";
    loadData();
  }
});

async function api(path) {
  const r = await fetch("https://api.clickup.com/api/v2" + path, {
    headers: { "Authorization": API_KEY, "Content-Type": "application/json" }
  });
  if (!r.ok) throw new Error("API error " + r.status);
  return r.json();
}

function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(now);
  monday.setDate(diff);
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  return { from: monday.getTime(), to: sunday.getTime() };
}

function getMonthRange() {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
  return { from: first.getTime(), to: last.getTime() };
}

async function fetchBookedTasks(fromTs, toTs) {
  let all = [];
  let page = 0;
  while (true) {
    const url = `/list/${LIST_ID}/task?statuses[]=booked%20%F0%9F%8E%89&include_closed=true&date_done_gt=${fromTs}&date_done_lt=${toTs}&page=${page}&subtasks=false`;
    const data = await api(url);
    if (!data.tasks || data.tasks.length === 0) break;
    all = all.concat(data.tasks);
    if (data.tasks.length < 100) break;
    page++;
  }
  return all;
}

function getAdvisor(task) {
  if (!task.custom_fields) return "Non assigné";
  const f = task.custom_fields.find(cf => cf.id === ADVISOR_FIELD_ID);
  if (f && f.value !== null && f.value !== undefined) {
    return ADVISORS[f.value] || "Non assigné";
  }
  return "Non assigné";
}

function getServiceDate(task) {
  if (!task.custom_fields) return null;
  const f = task.custom_fields.find(cf => cf.id === "1349e15f-9fe7-46a0-a2e7-65b4de72ba20");
  return f && f.value ? Number(f.value) : null;
}

async function loadData() {
  const loading = document.getElementById("loading");
  const dashboard = document.getElementById("dashboard");
  loading.style.display = "block";
  dashboard.style.display = "none";

  const msgs = ["Connexion à ClickUp...", "Récupération des réservations...", "Analyse par conseiller...", "Préparation du tableau..."];
  let mi = 0;
  const msgInterval = setInterval(() => { mi = (mi + 1) % msgs.length; document.getElementById("loadMsg").textContent = msgs[mi]; }, 2000);

  try {
    const week = getWeekRange();
    const month = getMonthRange();

    const [weekTasks, monthTasks] = await Promise.all([
      fetchBookedTasks(week.from, week.to),
      fetchBookedTasks(month.from, month.to)
    ]);

    const advisorWeek = {};
    weekTasks.forEach(t => {
      const adv = getAdvisor(t);
      advisorWeek[adv] = (advisorWeek[adv] || 0) + 1;
    });

    const bookings = weekTasks.slice(0, 20).map(t => ({
      name: t.name,
      advisor: getAdvisor(t),
      service_date: getServiceDate(t)
    }));

    clearInterval(msgInterval);
    loading.style.display = "none";
    dashboard.style.display = "block";

    render({
      week_total: weekTasks.length,
      month_total: monthTasks.length,
      advisor_week: advisorWeek,
      bookings: bookings
    });

  } catch (e) {
    clearInterval(msgInterval);
    loading.style.display = "none";
    dashboard.style.display = "block";
    dashboard.innerHTML = `<div class="error"><p>Erreur: ${e.message}</p><button onclick="loadData()">Réessayer</button><br><br><button class="btn" onclick="resetKey()" style="margin-top:8px">Changer la clé API</button></div>`;
  }
}

function resetKey() {
  localStorage.removeItem("hm_api_key");
  localStorage.removeItem("hm_goal");
  location.reload();
}

function render(data) {
  const now = new Date();
  const dateStr = now.toLocaleDateString("fr-CA", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const pct = Math.min(Math.round((data.month_total / GOAL) * 100), 100);

  const sorted = Object.entries(data.advisor_week)
    .filter(([n]) => n !== "Non assigné")
    .sort((a, b) => b[1] - a[1]);
  const maxC = sorted.length > 0 ? sorted[0][1] : 1;
  const unassigned = data.advisor_week["Non assigné"] || 0;

  const circumference = 2 * Math.PI * 30;
  const offset = circumference - (pct / 100) * circumference;

  let html = `
    <div class="header">
      <div class="header-left">
        <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></div>
        <div><h1>Harmony Movers</h1><p class="date">${dateStr}</p></div>
      </div>
      <div><button class="btn" onclick="loadData()">Actualiser</button> <button class="btn" onclick="resetKey()" style="margin-left:4px">⚙</button></div>
    </div>

    <div class="cards">
      <div class="card-red">
        <div class="circle"></div>
        <p class="card-label">Cette semaine</p>
        <p class="card-number mono">${data.week_total}</p>
        <p class="card-sub">réservations</p>
      </div>
      <div class="card">
        <p class="card-label">Mars 2026</p>
        <p class="card-number mono">${data.month_total}</p>
        <p class="card-sub">réservations</p>
      </div>
      <div class="card ring-card">
        <div class="ring-wrap">
          <svg width="72" height="72" style="transform:rotate(-90deg)">
            <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(192,57,43,0.12)" stroke-width="6"/>
            <circle cx="36" cy="36" r="30" fill="none" stroke="#c0392b" stroke-width="6" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1)"/>
          </svg>
          <div class="ring-text mono">${pct}%</div>
        </div>
        <p style="font-size:10px;color:#aaa;margin-top:6px">obj. ${GOAL}</p>
      </div>
    </div>

    <div style="margin-bottom:2rem">
      <h2 class="section-title">Classement conseillers — semaine</h2>
      ${sorted.map(([name, count], i) => `
        <div class="advisor-row" style="animation-delay:${i * 0.08}s">
          <span class="advisor-rank mono ${i === 0 ? 'first' : 'other'}">${i + 1}.</span>
          <span class="advisor-name">${name}</span>
          <div class="advisor-bar-bg">
            <div class="advisor-bar" style="width:${(count / maxC) * 100}%;background:${COLORS[name] || '#6b7280'}">
              ${count > 1 ? `<span>${count}</span>` : ''}
            </div>
          </div>
          <span class="advisor-count mono">${count}</span>
        </div>
      `).join('')}
      ${unassigned > 0 ? `
        <div class="advisor-row unassigned" style="animation-delay:${sorted.length * 0.08}s">
          <span class="advisor-rank mono other">—</span>
          <span class="advisor-name">Non assigné</span>
          <div style="flex:1"></div>
          <span class="advisor-count">${unassigned}</span>
        </div>
      ` : ''}
    </div>

    <div style="margin-bottom:1.5rem">
      <h2 class="section-title">Dernières réservations</h2>
      ${data.bookings.slice(0, 15).map((b, i) => {
        const d = b.service_date ? new Date(b.service_date).toLocaleDateString("fr-CA", { day: "numeric", month: "short" }) : "";
        const badge = b.advisor && b.advisor !== "Non assigné"
          ? `<span class="booking-badge" style="background:${COLORS[b.advisor] || '#6b7280'}18;color:${COLORS[b.advisor] || '#6b7280'}">${b.advisor}</span>`
          : "";
        return `<div class="booking-row" style="animation-delay:${i * 0.04}s">
          <div class="booking-dot"></div>
          <span class="booking-name">${b.name}</span>
          ${d ? `<span class="booking-date">${d}</span>` : ""}
          ${badge}
        </div>`;
      }).join('')}
      ${data.week_total > 15 ? `<p class="more-text">+ ${data.week_total - 15} autres réservations cette semaine</p>` : ""}
    </div>

    <div class="footer">
      <div class="footer-dot"></div>
      <p>Données en direct de ClickUp · Harmony Movers ${new Date().getFullYear()}</p>
    </div>
  `;

  document.getElementById("dashboard").innerHTML = html;
}
</script>
</body>
</html>
